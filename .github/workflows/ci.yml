name: AuraPronounce CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run Pytest
        env:
          DATABASE_URL: sqlite:///./test.db
          REDIS_URL: redis://localhost:6379/0
          ENCRYPTION_KEY: a1_B2-C3_D4-E5_F6-G7_H8-I9_J0-K1_L2-M3_N4=
          PYTHONPATH: .
        run: |
          cd backend
          python -m pytest -v

  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Attempt dependency install
      - name: Install dependencies
        run: |
          cd frontend
          npm install --legacy-peer-deps

      - name: Typecheck Next.js
        run: |
          cd frontend
          npm run typecheck

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-check]
    steps:
      - uses: actions/checkout@v4

      - name: Build Backend Docker Image
        run: |
          docker build -t aurapronounce-backend:latest ./backend

      - name: Build Frontend Docker Image
        run: |
          docker build -t aurapronounce-frontend:latest ./frontend
